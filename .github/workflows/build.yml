name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Generate Gradle wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.6
          chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Последняя сборка"
          body: "Автоматическая сборка. Скачай APK ниже."
          files: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Print download link
        run: |
          echo ""
          echo "══════════════════════════════════════════════════"
          echo "  📱 ПРЯМАЯ ССЫЛКА ДЛЯ СКАЧИВАНИЯ НА ТЕЛЕФОН:"
          echo ""
          echo "  https://github.com/${{ github.repository }}/releases/latest/download/app-debug.apk"
          echo ""
          echo "══════════════════════════════════════════════════"
